<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Criar Pedido</title>
        <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
        <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="../styles/criar_pedido.css">
        <link rel="icon" type="image/x-icon" href="../images/logo-favicon.ico">
    </head>
    <body>

        <main class="form-container">
            <form>
                <div class="form-group">
                    <label for="titulo">Título do pedido</label>
                    <input type="text" id="titulo" placeholder="Ex: Preciso de cesta básica" required>
                </div>

                <div class="form-group">
                    <label for="descricao">Descrição</label>
                    <textarea id="descricao" rows="4" placeholder="Descreva o que você precisa..." required></textarea>
                </div>

                <div class="form-group">
                    <label for="categoria">Categoria</label>
                    <div class="select-wrapper">
                        <select id="categoria" required>
                            <option value="" disabled selected hidden>Selecione uma categoria</option>
                            <option value="roupa">Roupa</option>
                            <option value="alimento">Alimento</option>
                            <option value="higiene">Itens de higiene</option>
                            <option value="outros">Outros</option>
                        </select>
                        <span class="material-icons-outlined select-arrow">expand_more</span>
                    </div>
                </div>

                <div class="form-group">
                    <label>Urgência</label>
                    <div class="urgencia-container">
                    
                        <label class="urgencia-card alta">
                            <input type="radio" name="urgencia" value="alta" required>
                            <span class="urgencia-content">
                                <span class="material-icons-outlined">error_outline</span>
                                Alta
                            </span>
                        </label>

                        <label class="urgencia-card media">
                            <input type="radio" name="urgencia" value="media">
                            <span class="urgencia-content">
                                <span class="material-icons-outlined">lightbulb</span>
                                Média
                            </span>
                        </label>

                        <label class="urgencia-card baixa">
                            <input type="radio" name="urgencia" value="baixa">
                            <span class="urgencia-content">
                                <span class="material-icons-outlined">check_circle_outline</span>
                                Baixa
                            </span>
                        </label>

                    </div>
                </div>

                <button type="submit" class="btn-submit">
        <span class="material-icons-outlined">send</span> PUBLICAR PEDIDO
    </button>
</form>
</main>

<script>
    // Seleciona o formulário e impede o envio padrão
    document.querySelector('form').addEventListener('submit', function(event) {
        event.preventDefault(); // Impede a página de recarregar

        // 1. Captura os valores digitados
        const titulo = document.getElementById('titulo').value;
        const descricao = document.getElementById('descricao').value;
        const categoria = document.getElementById('categoria').value;
        const urgencia = document.querySelector('input[name="urgencia"]:checked').value;

        // 2. Cria um pacote (objeto) com esses dados
        const dadosPedido = {
            titulo: titulo,
            descricao: descricao,
            categoria: categoria,
            urgencia: urgencia
        };

        // 3. Salva no LocalStorage do navegador
        localStorage.setItem('novoPedido', JSON.stringify(dadosPedido));

        // 4. Mostra o alerta e redireciona para a página receber
        alert("Pedido solicitado com êxito!!!");
        window.location.href = "./receber.php"; 
    });
</script>

    </body>
</html>
